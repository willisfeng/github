name: 每日抓取 GitHub 热门仓库

on:
  schedule:
    # 每天 UTC 18:00 = 北京时间凌晨 2:00
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 运行抓取脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node fetch.js

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          git diff --staged --quiet || git commit -m "自动更新数据 [skip ci]"
          git push
