<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 热门仓库排行</title>
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-content">
                <svg class="github-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <h1>GitHub 热门项目排行榜</h1>
            </div>
            <p class="subtitle">近一周创建 · 星标 &gt; 1000 · 按星标排名 · 含 README 简介 · 每日凌晨2点更新</p>
            <div class="controls">
                <button class="btn btn-refresh" onclick="refreshData()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    刷新数据
                </button>
                <span class="last-update" id="lastUpdate"></span>
            </div>
        </header>

        <!-- 加载状态 -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在从 GitHub 获取数据…</p>
        </div>

        <!-- 错误提示 -->
        <div class="error-box" id="errorBox" style="display:none">
            <svg viewBox="0 0 24 24" width="48" height="48" fill="#f85149"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <h3>获取数据失败</h3>
            <p id="errorMsg"></p>
            <button class="btn btn-retry" onclick="refreshData()">重试</button>
        </div>

        <!-- 统计概览 -->
        <div class="stats-bar" id="statsBar" style="display:none">
            <div class="stat-item">
                <span class="stat-value" id="totalRepos">0</span>
                <span class="stat-label">符合条件</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="totalStars">0</span>
                <span class="stat-label">累计星标</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="avgStars">0</span>
                <span class="stat-label">平均星标</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="topLanguage">-</span>
                <span class="stat-label">热门语言</span>
            </div>
        </div>

        <!-- 分页导航（顶部） -->
        <div class="pagination pagination-top" id="paginationTop" style="display:none"></div>

        <!-- 仓库网格 -->
        <div class="repo-grid" id="repoGrid"></div>

        <!-- 分页导航（底部） -->
        <div class="pagination pagination-bottom" id="paginationBottom" style="display:none"></div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>数据来源：<a href="https://api.github.com" target="_blank">GitHub REST API</a> · 搜索范围：近一周创建 · 星标 &gt; 1000 · 按星标排名 · GitHub Actions 每日凌晨2点自动抓取</p>
        </footer>
    </div>

    <script src="data.js?v=1"></script>
    <script src="app.js?v=10"></script>
</body>
</html>
